<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Announcements - UAPMP</title>
    <link rel="stylesheet" href="../css/student-profile.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      .announcement-list {
        background: #fff;
        border-radius: 8px;
        padding: 2rem;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        margin-top: 2rem;
      }
      .announcement-item {
        border-bottom: 1px solid #eee;
        padding: 1rem 0;
      }
      .announcement-item:last-child {
        border-bottom: none;
      }
      .announcement-title {
        font-weight: bold;
        font-size: 1.1rem;
      }
      .announcement-message {
        margin: 0.5rem 0 0.2rem 0;
      }
      .announcement-meta {
        font-size: 0.9rem;
        color: #888;
      }
    </style>
  </head>
  <body class="min-h-screen font-sans bg-gray-100">
    <header class="fixed top-0 left-0 w-full bg-white z-40 shadow-sm">
      <div
        class="max-w-5xl mx-auto px-4 sm:px-8 h-14 flex items-center justify-between"
      >
        <div class="flex items-center gap-3 font-semibold text-lg">
          <span style="color: #3b82f6">UAPMP</span>
          <span class="text-gray-800">Announcements</span>
        </div>
        <a href="student-profile.html" class="text-blue-600 font-semibold"
          >Back to Dashboard</a
        >
      </div>
    </header>
    <main class="max-w-3xl mx-auto pt-24 pb-8">
      <section class="announcement-list">
        <h2 class="text-xl font-bold mb-4">Your Announcements</h2>
        <div id="announcementsList"></div>
      </section>
    </main>
    <script src="../config.js"></script>
    <script>
      const API_URL =
        window.API_CONFIG && window.API_CONFIG.BASE_URL
          ? window.API_CONFIG.BASE_URL
          : "http://localhost:5000";
      const ANNOUNCEMENTS_URL = API_URL + "/api/announcements";
      const token = localStorage.getItem("token");

      async function fetchAnnouncements() {
        const res = await fetch(ANNOUNCEMENTS_URL, {
          headers: { Authorization: `Bearer ${token}` },
        });
        const data = await res.json();
        renderAnnouncements(data.announcements || []);
      }

      function renderAnnouncements(list) {
        const container = document.getElementById("announcementsList");
        if (!list.length) {
          container.innerHTML =
            '<div class="text-gray-500">No announcements yet.</div>';
          return;
        }
        container.innerHTML = list
          .map(
            (a) => `
          <div class="announcement-item">
            <div class="announcement-title">${a.title}</div>
            <div class="announcement-message">${a.message}</div>
            ${a.link ? `<div class="announcement-link"><a href="${a.link}" target="_blank" style="color:#2563eb;word-break:break-all;">${a.link}</a></div>` : ""}
            <div class="announcement-meta">Posted: ${new Date(a.createdAt).toLocaleString()}</div>
          </div>
        `,
          )
          .join("");
      }

      fetchAnnouncements();
    </script>
  </body>
</html>
