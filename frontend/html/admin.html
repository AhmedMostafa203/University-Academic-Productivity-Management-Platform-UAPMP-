<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Profile - UniPlatform</title>
<link href="admin.css" rel="stylesheet">
</head>

<body class="light">

<!-- NAVBAR -->
<nav class="navbar">
<div class="navbar-content">

<div class="logo">
<div class="logo-icon">U</div>
<span>UniPlatform</span>
</div>

<div class="nav-buttons">
<button id="sidebar-toggle">☰</button>
<button id="dark-toggle">🌙</button>
</div>

</div>
</nav>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">

<div class="sidebar-header">
<h2>Anonymous</h2>
<button id="sidebar-close">×</button>
</div>

<div class="sidebar-avatar">
<div class="avatar-circle">👤</div>
<h3>Anonymous User</h3>
<p>anonymous@uniplatform.edu</p>
</div>

<ul class="sidebar-links">
<li><a href="anonymous.html">Anonymous</a></li>
</ul>

</div>

<!-- BACKDROP -->
<div id="sidebar-backdrop" class="sidebar-backdrop"></div>

<!-- MAIN CONTENT -->
<main class="main-content">

<header>
<h1>Admin Settings</h1>
<p>Manage your personal information and account preferences.</p>
</header>

<section class="profile-section">

<div class="profile-grid">

<div class="avatar-section">
<div class="avatar-circle-large">AM</div>
<span class="role-badge">Admin</span>
</div>

<div class="form-fields">

<div class="input-group">
<label>Full Name</label>
<input type="text" value="Alexander Mitchell" disabled>
</div>

<div class="input-group">
<label>Email Address</label>
<input type="email" value="alexander.m@uniplatform.edu" disabled>
</div>

<div class="input-group">
<label>Department</label>
<input type="text" value="IT Services" disabled>
</div>

<div class="input-group">
<label>Staff ID</label>
<input type="text" value="ADM-98231-X" disabled>
</div>

</div>

</div>

</section>
</main>

<footer>
© 2024 UniPlatform. All rights reserved.
</footer>

<script>

// Sidebar toggle
const sidebar = document.getElementById("sidebar");
const sidebarBackdrop = document.getElementById("sidebar-backdrop");

document.getElementById("sidebar-toggle").addEventListener("click", () => {
sidebar.classList.add("active");
sidebarBackdrop.classList.add("active");
});

document.getElementById("sidebar-close").addEventListener("click", () => {
sidebar.classList.remove("active");
sidebarBackdrop.classList.remove("active");
});

sidebarBackdrop.addEventListener("click", () => {
sidebar.classList.remove("active");
sidebarBackdrop.classList.remove("active");
});

// Dark Mode
const darkToggle = document.getElementById("dark-toggle");

darkToggle.addEventListener("click", () => {

if(document.body.classList.contains("dark")){
document.body.classList.remove("dark");
document.body.classList.add("light");
localStorage.setItem("theme","light");
darkToggle.textContent="🌙";
}
else{
document.body.classList.remove("light");
document.body.classList.add("dark");
localStorage.setItem("theme","dark");
darkToggle.textContent="☀️";
}

});

// Load theme
if(localStorage.getItem("theme")==="dark"){
document.body.classList.remove("light");
document.body.classList.add("dark");
darkToggle.textContent="☀️";
}
else{
document.body.classList.remove("dark");
document.body.classList.add("light");
darkToggle.textContent="🌙";
}

</script>

</body>
</html>
